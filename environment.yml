name: qubo-env
channels:
  - conda-forge
  - ibmdecisionoptimization
  - defaults

dependencies:
  - python=3.11
  - scip
  - cplex
  - pip
  - pip:
      - numpy>=1.26
      - pyomo>=6.9
      - "qubolite>=0.7,<0.8"   # 0.8+ has a C extension that fails on Windows MSVC
      - notebook>=7.0
      - ipykernel>=6.29
      - -e .        # installs local repo as a package